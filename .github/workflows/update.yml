name: Stock Market Monitor

on:
  # 每4小时执行一次 (0, 4, 8, 12, 16, 20点北京时间)
  schedule:
    - cron: '0 0,4,8,12,16 * * *'
  # 支持手动触发
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run crawler and generator
        run: |
          python scripts/main.py
          # 将生成的HTML复制到根目录
          cp output/index.html ./index.html
          
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html data/
          git diff --quiet && git diff --staged --quiet || git commit -m "自动更新: $(date '+%Y-%m-%d %H:%M')"
          git push
